<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade Patrick | Contact</title>
    
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../Style/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="bg-shape s1"></div>
    <div class="bg-shape s2"></div>

    <header>
        <div class="logo">Personal Profile</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects & Skills</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <section class="section reveal">
        <h2>Drop a Message</h2>
        
        <form id="mongo-contact-form" class="contact-form">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="message" rows="5" placeholder="Message" required></textarea>
            <button type="submit" id="submit-btn">Send Message</button>
            <div id="form-status" class="status-msg"></div>
        </form>
    </section>

    <section class="social-banner">
        <h3>Connect With Me</h3>
        <div class="social-row">
            <a href="https://www.facebook.com/share/1DAHw2x4QT/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-facebook-f"></i> facebook</a>
            <a href="https://www.instagram.com/iam.jadeeeeeeeee?igsh=bHdmMmdwdWo0a2No" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i> instagram</a>
            <a href="https://youtube.com/@jr_educators?si=QnRAGDJ5duNEMr8T" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-youtube"></i> youtube</a>
            <a href="https://vt.tiktok.com/ZSCBKYwdV/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-tiktok"></i> tiktok</a>
        </div>
    </section>

    <footer class="footer">
        <div class="credit">© 2026 Jade Patrick | Profile</div>
    </footer>

    <script src="../script.js"></script>

    <script src="config.js"></script>

    <script>
        // Fallback: Use Vercel Environment Variables if config.js isn't present or live
        const FINAL_URL = typeof SUPABASE_URL !== 'undefined' && SUPABASE_URL ? SUPABASE_URL : "__SUPABASE_URL_PLACEHOLDER__";
        const FINAL_KEY = typeof SUPABASE_ANON_KEY !== 'undefined' && SUPABASE_ANON_KEY ? SUPABASE_ANON_KEY : "__SUPABASE_KEY_PLACEHOLDER__";

        document.getElementById('mongo-contact-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('form-status');
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;
            statusMsg.style.display = "none";

            const payload = {
                name: name,
                email: email,
                message: message
            };

            try {
                const response = await fetch(FINAL_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': FINAL_KEY,
                        'Authorization': `Bearer ${FINAL_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal' 
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMsg.innerText = "Success! Your message was saved to Supabase Cloud Storage.";
                    statusMsg.className = "status-msg status-success";
                    statusMsg.style.display = "block";
                    document.getElementById('mongo-contact-form').reset(); 
                } else {
                    throw new Error('Failed response from database endpoint.');
                }
            } catch (error) {
                console.error("Supabase Error:", error);
                statusMsg.innerText = "Error sending message. Please check database configuration.";
                statusMsg.className = "status-msg status-error";
                statusMsg.style.display = "block";
            } finally {
                submitBtn.innerText = "Send Message";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
