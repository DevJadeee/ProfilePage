<body>

    <section class="section reveal">
        <h2>Drop a Message</h2>
        
        <form id="mongo-contact-form" class="contact-form">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="message" rows="5" placeholder="Message" required></textarea>
            <button type="submit" id="submit-btn">Send Message</button>
            <div id="form-status" class="status-msg"></div>
        </form>

    <section class="social-banner">

            <a href="https://www.instagram.com/iam.jadeeeeeeeee?igsh=bHdmMmdwdWo0a2No" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-instagram"></i> instagram</a>
            <a href="https://youtube.com/@jr_educators?si=QnRAGDJ5duNEMr8T" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-youtube"></i> youtube</a>

    <script src="../script.js"></script>
    <script>
        // Supabase Cloud Database Configuration
        const SUPABASE_URL = "https://znpjrdticwxcxxhsqnlf.supabase.co/rest/v1/messages"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpucGpyZHRpY3d4Y3h4aHNxbmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Mjk2MjEsImV4cCI6MjA5ODIwNTYyMX0.gqo_ssjJ15U5jHDTSDTc6RDDaLzwdXCXyJRuS5O-3y0";

        document.getElementById('mongo-contact-form').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            
            const submitBtn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('form-status');
            
            // Get input data
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            // UI feedback
            submitBtn.innerText = "Sending...";
            submitBtn.disabled = true;
            statusMsg.style.display = "none";

            // Prepare payload for Supabase
            const payload = {
                name: name,
                email: email,
                message: message
            };

            try {
                const response = await fetch(SUPABASE_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal' 
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMsg.innerText = "Success! Your message was saved to Supabase Cloud Storage.";
                    statusMsg.className = "status-msg status-success";
                    statusMsg.style.display = "block";
                    document.getElementById('mongo-contact-form').reset(); // Clear inputs
                } else {
                    // Try to read error message details from Supabase if request fails
                    const errDetail = await response.json().catch(() => ({}));
                    console.error("Supabase API rejection info:", errDetail);
                    throw new Error(errDetail.message || 'Failed response from database endpoint.');
                }
            } catch (error) {
                console.error("Supabase Error:", error);
                statusMsg.innerText = "Error sending message. Please check database configuration.";
                statusMsg.className = "status-msg status-error";
                statusMsg.style.display = "block";
            } finally {
                submitBtn.innerText = "Send Message";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
